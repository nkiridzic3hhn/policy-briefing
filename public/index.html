<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Piece of Pi</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #fdf2f5;
      --surface2: #f9e6ec;
      --border: rgba(180,60,90,0.15);
      --border-hover: rgba(180,60,90,0.3);
      --text: #2a0f18;
      --text-muted: #8a4055;
      --text-dim: #b8788a;
      --accent: #c03060;
      --accent-dim: rgba(192,48,96,0.1);
      --amber: #e8a87a;
      --amber-dim: rgba(232,168,122,0.12);
      --red: #b02040;
      --red-dim: rgba(176,32,64,0.1);
      --green: #e87a9f;
      --green-dim: rgba(232,122,159,0.1);
      --purple: #9b4080;
      --purple-dim: rgba(155,64,128,0.1);
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img {
      height: 160px;
      width: auto;
      animation: logobounce 0.6s infinite alternate cubic-bezier(.4,0,.2,1);
    }
    #splash p {
      margin-top: 20px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #b8788a;
      opacity: 0;
      animation: fadein 0.5s 0.5s forwards;
    }
    @keyframes logobound {
      from { transform: translateY(0); }
      to   { transform: translateY(-20px); }
    }
    @keyframes logobound { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    @keyframes logobouncex { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    @keyframes logobouncefinal { from { transform: translateY(0px); } to { transform: translateY(-20px); } }
    @keyframes logobouncefinalv2 { 0% { transform: translateY(0px); } 100% { transform: translateY(-20px); } }
    @keyframes logobounceclear { from { transform: translateY(0px); } to { transform: translateY(-22px); } }
    @keyframes logobouncesimple { from { transform: translateY(0); } to { transform: translateY(-22px); } }
    @keyframes logobouncefixed { 0% { transform: translateY(0); } 100% { transform: translateY(-22px); } }
    @keyframes logobounceworking { 0% { transform: translateY(0px); } 100% { transform: translateY(-22px); } }
    @keyframes logobouncenew { from { transform: translateY(0px); } to { transform: translateY(-22px); } }
    @keyframes logobouncefinal2 { 0%{ transform: translateY(0); } 100%{ transform: translateY(-22px); } }
    @keyframes logobounce { 0%{ transform:translateY(0); } 100%{ transform:translateY(-22px); } }
    @keyframes logobouncedone { from{ transform:translateY(0); } to{ transform:translateY(-22px); } }
    @keyframes bounce { from{ transform:translateY(0); } to{ transform:translateY(-22px); } }
    @keyframes fadein { to { opacity: 1; } }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo img { height: 84px; width: auto; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.3; }
    .logo-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .logo-sub { font-size: 10px; color: var(--text-dim); font-weight: 400; letter-spacing: .04em; }
    #lastUpdated { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }

    /* ── Layout ── */
    .layout { display: flex; height: calc(100vh - 68px); }

    /* ── Sidebar ── */
    aside {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      background: #fff;
    }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
    .sidebar-label {
      font-size: 10px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }
    .chk-row {
      display: flex; align-items: center; gap: 8px; padding: 4px 0;
      cursor: pointer; font-size: 13px; color: var(--text-muted); transition: color .15s;
    }
    .chk-row:hover { color: var(--text); }
    .chk-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .state-search {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 10px; font-size: 12px;
      color: var(--text); outline: none; margin-bottom: 8px; font-family: inherit;
    }
    .state-search:focus { border-color: var(--accent); }
    .state-search::placeholder { color: var(--text-dim); }
    .state-scroll { max-height: 220px; overflow-y: auto; }
    .state-scroll::-webkit-scrollbar { width: 3px; }
    .state-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sel-count { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }
    select.styled {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 6px 10px; font-size: 12px;
      color: var(--text); outline: none; font-family: inherit; cursor: pointer;
    }
    select.styled:focus { border-color: var(--accent); }
    .run-btn {
      width: 100%; padding: 10px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s;
    }
    .run-btn:hover { opacity: .88; }
    .run-btn:active { transform: scale(.98); }
    .run-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .predict-btn {
      width: 100%; padding: 10px; background: var(--purple-dim); color: var(--purple);
      border: 1px solid rgba(155,64,128,0.25); border-radius: var(--radius);
      font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s;
    }
    .predict-btn:hover { opacity: .8; }
    .predict-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Main ── */
    main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .main-header { margin-bottom: 1rem; }
    .main-header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
    .main-header p { font-size: 13px; color: var(--text-muted); }

    /* ── Tabs ── */
    .tab-row { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; border-bottom: 2px solid transparent; background: none;
      color: var(--text-muted); font-family: inherit; transition: color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .bm-count {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff; font-size: 10px; font-weight: 600;
      width: 16px; height: 16px; border-radius: 50%; margin-left: 5px;
    }

    /* ── Alerts ── */
    .error-banner {
      background: var(--red-dim); border: 1px solid rgba(176,32,64,0.2);
      border-radius: var(--radius); padding: 10px 14px; font-size: 13px;
      color: var(--red); margin-bottom: 1rem; display: none; word-break: break-all;
    }

    /* ── Empty / Loading ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 5rem 2rem; text-align: center; color: var(--text-muted);
    }
    .empty-icon { font-size: 40px; margin-bottom: 1rem; opacity: .25; }
    .empty-state h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 13px; max-width: 320px; }
    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 5rem 2rem; gap: 16px;
      color: var(--text-muted); font-size: 13px; text-align: center;
    }
    .loading-state img {
      height: 90px; width: auto;
      animation: bounce 0.6s infinite alternate cubic-bezier(.4,0,.2,1);
    }
    .loading-state .load-title {
      font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 2px;
    }
    .loading-state .load-sub {
      font-size: 12px; color: var(--text-dim); max-width: 280px; line-height: 1.6;
    }

    /* ── Results ── */
    .results-meta {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem; font-size: 12px; color: var(--text-muted);
    }
    .legend { display: flex; gap: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .articles-grid { display: flex; flex-direction: column; gap: 10px; }

    /* ── Cards ── */
    .article-card {
      background: var(--surface); border: 1px solid var(--border);
      border-left-width: 3px; border-radius: var(--radius-lg);
      padding: 1rem 1.25rem; transition: border-color .15s; position: relative;
    }
    .article-card:hover { border-color: var(--border-hover); }
    .article-card.high { border-left-color: var(--red); }
    .article-card.medium { border-left-color: var(--amber); }
    .article-card.low { border-left-color: var(--accent); }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; padding-right: 32px; }
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .badge-pink   { background: var(--accent-dim); color: var(--accent); }
    .badge-amber  { background: var(--amber-dim);  color: #a06020; }
    .badge-red    { background: var(--red-dim);    color: var(--red); }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-green  { background: var(--green-dim);  color: #903050; }
    .badge-gray   { background: rgba(0,0,0,0.05);  color: var(--text-muted); }
    .card-source { margin-left: auto; font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; color: var(--text); }
    .card-summary { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 10px; opacity: .8; transition: opacity .15s; }
    .card-link:hover { opacity: 1; }
    .bookmark-btn {
      position: absolute; top: 12px; right: 12px; background: none; border: none;
      cursor: pointer; font-size: 18px; opacity: .3; transition: opacity .2s, transform .15s; padding: 2px; line-height: 1;
    }
    .bookmark-btn:hover { opacity: 1; transform: scale(1.15); }
    .bookmark-btn.saved { opacity: 1; }

    /* ── Prediction ── */
    .prediction-box {
      background: var(--surface); border: 1px solid rgba(155,64,128,0.2);
      border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem;
    }
    .prediction-box h3 { font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 4px; }
    .prediction-box .pred-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }
    .prediction-box p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 10px; }
    .prediction-box p:last-child { margin-bottom: 0; }
    .prediction-box strong { color: var(--text); font-weight: 600; }

    @media (max-width: 768px) {
      .layout { flex-direction: column; height: auto; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash">
  <img src="/logo.png" alt="Policy Intelligence">
  <p>Loading Policy Intelligence&hellip;</p>
</div>

<!-- Header -->
<header>
  <div class="logo">
    <img src="/logo.png" alt="PI Logo">
    <div class="logo-text">
      <span class="logo-title">Policy Intelligence</span>
      <span class="logo-sub">Medicaid &amp; Home Care Monitor</span>
    </div>
  </div>
  <span id="lastUpdated"></span>
</header>

<!-- App Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div>
      <div class="sidebar-label">Topics</div>
      <div id="topicFilters"></div>
    </div>
    <div>
      <div class="sidebar-label">Date Range</div>
      <select class="styled" id="dateRange">
        <option value="1">Last 30 days</option>
        <option value="3" selected>Last 3 months</option>
        <option value="6">Last 6 months</option>
        <option value="12">Last 12 months</option>
      </select>
    </div>
    <div>
      <div class="sidebar-label">Scope</div>
      <input class="state-search" type="text" id="stateSearch" placeholder="Search states&hellip;" oninput="filterStates(this.value)">
      <div class="state-scroll" id="stateList"></div>
      <p class="sel-count" id="selCount">0 selected</p>
    </div>
    <button class="run-btn" id="runBtn" onclick="runBriefing()">Run briefing</button>
    <button class="predict-btn" id="predictBtn" onclick="runPrediction()">&#10022; AI Prediction</button>
  </aside>

  <!-- Main Content -->
  <main>
    <div class="main-header">
      <h1>Policy Intelligence Briefing</h1>
      <p>Medicaid &middot; Home care &middot; Community-based services &mdash; federal &amp; state monitoring</p>
    </div>

    <div class="tab-row">
      <button class="tab active" id="tab-briefing" onclick="switchTab('briefing')">Briefing</button>
      <button class="tab" id="tab-bookmarks" onclick="switchTab('bookmarks')">
        Bookmarks <span class="bm-count" id="bmCount" style="display:none"></span>
      </button>
      <button class="tab" id="tab-prediction" onclick="switchTab('prediction')" style="display:none">&#10022; AI Prediction</button>
    </div>

    <div class="error-banner" id="errorBanner"></div>
    <div id="mainContent"></div>
  </main>

</div>

<script>
const STATES = [
  "Federal/National","Alabama","Alaska","Arizona","Arkansas","California",
  "Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho",
  "Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine",
  "Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri",
  "Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico",
  "New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon",
  "Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee",
  "Texas","Utah","Vermont","Virginia","Washington","West Virginia",
  "Wisconsin","Wyoming","District of Columbia"
];

const TOPICS = [
  { id: "medicaid",   label: "Medicaid Policy"  },
  { id: "homecare",   label: "Home Care"         },
  { id: "hcbs",       label: "HCBS / Waivers"   },
  { id: "evv",        label: "EVV / Compliance"  },
  { id: "workforce",  label: "Workforce"         },
  { id: "budget",     label: "Budget / Funding"  },
  { id: "legislation",label: "Legislation"       }
];

const TOPIC_BADGE = {
  "Medicaid Policy":  "badge-pink",
  "Home Care":        "badge-pink",
  "HCBS / Waivers":   "badge-green",
  "HCBS/Waivers":     "badge-green",
  "EVV / Compliance": "badge-amber",
  "EVV/Compliance":   "badge-amber",
  "Workforce":        "badge-purple",
  "Budget / Funding": "badge-red",
  "Budget/Funding":   "badge-red",
  "Legislation":      "badge-pink"
};

let selStates  = new Set();
let selTopics  = new Set(TOPICS.map(t => t.id));
let articles   = [];
let predText   = "";
let curTab     = "briefing";
let bookmarks  = [];

try { bookmarks = JSON.parse(localStorage.getItem("pi_bookmarks") || "[]"); } catch(e) {}

// ── Bookmarks ──
function saveBookmarks() {
  try { localStorage.setItem("pi_bookmarks", JSON.stringify(bookmarks)); } catch(e) {}
  updateBmCount();
}
function updateBmCount() {
  var c = document.getElementById("bmCount");
  if (bookmarks.length > 0) { c.textContent = bookmarks.length; c.style.display = "inline-flex"; }
  else { c.style.display = "none"; }
}
function isBookmarked(title) { return bookmarks.some(function(b) { return b.title === title; }); }
function toggleBookmark(article) {
  if (isBookmarked(article.title)) {
    bookmarks = bookmarks.filter(function(b) { return b.title !== article.title; });
  } else {
    article.savedAt = new Date().toISOString();
    bookmarks.push(article);
  }
  saveBookmarks();
  if (curTab === "briefing")   renderArticles(articles);
  if (curTab === "bookmarks")  renderBookmarks();
}

// ── Sidebar builders ──
function buildTopicFilters() {
  var html = "";
  for (var i = 0; i < TOPICS.length; i++) {
    var t = TOPICS[i];
    var checked = selTopics.has(t.id) ? "checked" : "";
    html += '<label class="chk-row"><input type="checkbox" ' + checked + ' data-id="' + t.id + '" onchange="toggleTopic(this.dataset.id, this.checked)"> ' + t.label + '</label>';
  }
  document.getElementById("topicFilters").innerHTML = html;
}
function toggleTopic(id, checked) { if (checked) selTopics.add(id); else selTopics.delete(id); }

function buildStateList(filter) {
  filter = filter || "";
  var html = "";
  for (var i = 0; i < STATES.length; i++) {
    var s = STATES[i];
    if (s.toLowerCase().indexOf(filter.toLowerCase()) === -1) continue;
    var checked = selStates.has(s) ? "checked" : "";
    html += '<label class="chk-row"><input type="checkbox" ' + checked + ' data-state="' + s.replace(/"/g, "&quot;") + '" onchange="toggleState(this.dataset.state, this.checked)"> ' + s + '</label>';
  }
  document.getElementById("stateList").innerHTML = html;
  updateCount();
}
function filterStates(v) { buildStateList(v); }
function toggleState(s, checked) { if (checked) selStates.add(s); else selStates.delete(s); updateCount(); }
function updateCount() { document.getElementById("selCount").textContent = selStates.size + " selected"; }

// ── Error ──
function showError(msg) {
  var b = document.getElementById("errorBanner");
  b.textContent = (typeof msg === "object") ? JSON.stringify(msg) : msg;
  b.style.display = "block";
}
function hideError() { document.getElementById("errorBanner").style.display = "none"; }

// ── Tabs ──
function switchTab(tab) {
  curTab = tab;
  ["briefing","bookmarks","prediction"].forEach(function(t) {
    var el = document.getElementById("tab-" + t);
    if (el) el.classList.remove("active");
  });
  var active = document.getElementById("tab-" + tab);
  if (active) active.classList.add("active");
  hideError();
  if (tab === "briefing")   renderArticles(articles);
  if (tab === "bookmarks")  renderBookmarks();
  if (tab === "prediction") renderPrediction();
}

// ── Card HTML ──
function cardHTML(a) {
  var urg = (a.urgency || "low").toLowerCase();
  var tb  = TOPIC_BADGE[a.topic] || "badge-gray";
  var src = [a.source, a.date].filter(Boolean).join(" · ");
  var bm  = isBookmarked(a.title);
  var aJson = JSON.stringify(a).replace(/</g,"\\u003c").replace(/>/g,"\\u003e");
  return '<div class="article-card ' + urg + '">' +
    '<button class="bookmark-btn ' + (bm ? "saved" : "") + '" onclick="toggleBookmark(' + aJson + ')" title="' + (bm ? "Remove" : "Save") + '">' + (bm ? "🔖" : "🏷️") + '</button>' +
    '<div class="card-meta">' +
    '<span class="badge badge-pink">' + (a.state || "Unknown") + '</span>' +
    '<span class="badge ' + tb + '">' + (a.topic || "General") + '</span>' +
    (urg === "high" ? '<span class="badge badge-red">High priority</span>' : '') +
    '<span class="card-source">' + src + '</span>' +
    '</div>' +
    '<p class="card-title">' + a.title + '</p>' +
    '<p class="card-summary">' + a.summary + '</p>' +
    (a.url && a.url.indexOf("http") === 0 ? '<a class="card-link" href="' + a.url + '" target="_blank">&#8599; Read source</a>' : '') +
    '</div>';
}

// ── Render functions ──
function renderArticles(data) {
  if (!data || !data.length) {
    document.getElementById("mainContent").innerHTML =
      '<div class="empty-state"><div class="empty-icon">📋</div><h2>No briefing loaded yet</h2><p>Select your states and topics on the left, then click Run Briefing.</p></div>';
    return;
  }
  var cards = "";
  for (var i = 0; i < data.length; i++) cards += cardHTML(data[i]);
  document.getElementById("mainContent").innerHTML =
    '<div class="results-meta"><span>' + data.length + ' update' + (data.length !== 1 ? "s" : "") + ' found</span>' +
    '<div class="legend">' +
    '<span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>High</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>Medium</span>' +
    '<span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Low</span>' +
    '</div></div>' +
    '<div class="articles-grid">' + cards + '</div>';
}

function renderBookmarks() {
  if (!bookmarks.length) {
    document.getElementById("mainContent").innerHTML =
      '<div class="empty-state"><div class="empty-icon">🔖</div><h2>No bookmarks yet</h2><p>Hit the bookmark icon on any card to save it here.</p></div>';
    return;
  }
  var cards = "";
  for (var i = 0; i < bookmarks.length; i++) cards += cardHTML(bookmarks[i]);
  document.getElementById("mainContent").innerHTML =
    '<div class="results-meta"><span>' + bookmarks.length + ' saved item' + (bookmarks.length !== 1 ? "s" : "") + '</span>' +
    '<button onclick="clearBookmarks()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;">Clear all</button></div>' +
    '<div class="articles-grid">' + cards + '</div>';
}
function clearBookmarks() {
  if (confirm("Clear all bookmarks?")) { bookmarks = []; saveBookmarks(); renderBookmarks(); }
}

function renderPrediction() {
  if (!predText) {
    document.getElementById("mainContent").innerHTML =
      '<div class="empty-state"><div class="empty-icon">&#10022;</div><h2>No prediction yet</h2><p>Select your states and click AI Prediction to generate a 12-month forward-looking analysis.</p></div>';
    return;
  }
  var ts = new Date().toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
  document.getElementById("mainContent").innerHTML =
    '<div class="prediction-box"><h3>&#10022; AI Policy Prediction</h3><p class="pred-meta">Generated ' + ts + ' &middot; Based on 12-month trend analysis</p>' + predText + '</div>';
}

// ── API call ──
async function callAPI(prompt) {
  var res = await fetch("/api/briefing", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-5",
      max_tokens: 8000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  var raw = await res.text();
  var parsed;
  try { parsed = JSON.parse(raw); } catch(e) { throw new Error("Server error: " + raw.slice(0, 200)); }
  if (!res.ok) {
    var msg = (parsed.error && parsed.error.message) ? parsed.error.message : JSON.stringify(parsed);
    throw new Error("API " + res.status + ": " + msg);
  }
  return (parsed.content || []).filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("");
}

// ── Run Briefing ──
async function runBriefing() {
  if (selStates.size === 0) { showError("Select at least one state or scope."); return; }
  hideError();
  var btn = document.getElementById("runBtn");
  btn.disabled = true; btn.textContent = "Fetching\u2026";
  switchTab("briefing");
  document.getElementById("mainContent").innerHTML =
    '<div class="loading-state"><img src="/logo.png" alt="Loading"><p class="load-title">Scanning the web&hellip;</p><p class="load-sub">This may take up to a minute while we cut through the internet for you.</p></div>';

  var months    = document.getElementById("dateRange").value;
  var dateLabel = months === "1" ? "last 30 days" : months === "3" ? "last 3 months" : months === "6" ? "last 6 months" : "last 12 months";
  var statesStr = Array.from(selStates).join(", ");
  var topicsStr = TOPICS.filter(function(t) { return selTopics.has(t.id); }).map(function(t) { return t.label; }).join(", ");

  var prompt = "Search the web for news and policy changes from the " + dateLabel + " related to home care, Medicaid, and community-based programs in: " + statesStr + ".\n" +
    "Topics: " + topicsStr + ".\n" +
    "Only include items from the " + dateLabel + ". Return ONLY a raw JSON array, no markdown, no fences. Up to 12 items each with these exact keys:\n" +
    "{\"title\":\"headline\",\"summary\":\"2-3 sentences\",\"state\":\"state or Federal/National\",\"topic\":\"Medicaid Policy|Home Care|HCBS/Waivers|EVV/Compliance|Workforce|Budget/Funding|Legislation\",\"date\":\"month year\",\"source\":\"name\",\"url\":\"url or empty string\",\"urgency\":\"high|medium|low\"}";

  try {
    var text  = await callAPI(prompt);
    var clean = text.replace(/```json|```/g, "").trim();
    var match = clean.match(/\[[\s\S]*\]/);
    var data  = JSON.parse(match ? match[0] : clean);
    if (Array.isArray(data)) {
      articles = data;
      renderArticles(articles);
      document.getElementById("lastUpdated").textContent = "Last run: " + new Date().toLocaleString("en-US", { month:"short", day:"numeric", hour:"2-digit", minute:"2-digit" });
    } else {
      showError("Unexpected response format. Please try again.");
      renderArticles([]);
    }
  } catch(err) {
    showError(err.message);
    renderArticles([]);
  } finally {
    btn.disabled = false; btn.textContent = "Run briefing";
  }
}

// ── AI Prediction ──
async function runPrediction() {
  if (selStates.size === 0) { showError("Select at least one state for the prediction."); return; }
  hideError();
  var btn = document.getElementById("predictBtn");
  btn.disabled = true; btn.textContent = "Analyzing\u2026";
  document.getElementById("tab-prediction").style.display = "";
  switchTab("prediction");
  document.getElementById("mainContent").innerHTML =
    '<div class="loading-state"><img src="/logo.png" alt="Loading"><p class="load-title">Analyzing policy trends&hellip;</p><p class="load-sub">Searching 12 months of legislative activity, regulatory changes, and policy shifts. This may take up to a minute &mdash; good things take time.</p></div>';

  var statesStr = Array.from(selStates).join(", ");
  var prompt = "You are a senior health policy analyst specializing in Medicaid and home care.\n\n" +
    "Search the web for policy trends, legislative activity, budget decisions, and regulatory changes over the last 12 months related to Medicaid, home care, HCBS, and community-based services in: " + statesStr + ".\n\n" +
    "Write a forward-looking predictive analysis covering:\n" +
    "1. The most significant trends and their direction\n" +
    "2. Specific predictions for the next 6-12 months in these states\n" +
    "3. How these changes could directly impact home care providers and recipients\n" +
    "4. Warning signs or opportunities home care operators should watch now\n\n" +
    "Format as paragraphs with bold section headers. Be specific with bill names, programs, dollar amounts. Write for a senior policy professional.";

  try {
    var text = await callAPI(prompt);
    predText = text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .split("\n\n")
      .map(function(p) { return "<p>" + p.replace(/\n/g, "<br>") + "</p>"; })
      .join("");
    renderPrediction();
  } catch(err) {
    showError(err.message);
  } finally {
    btn.disabled = false; btn.textContent = "\u2726 AI Prediction";
  }
}
