<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Policy Intelligence Briefing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --surface: #fdf2f5;
      --surface2: #f9e6ec;
      --border: rgba(180,60,90,0.15);
      --border-hover: rgba(180,60,90,0.3);
      --text: #2a0f18;
      --text-muted: #8a4055;
      --text-dim: #b8788a;
      --accent: #c03060;
      --accent-dim: rgba(217,79,122,0.15);
      --green: #e87a9f;
      --green-dim: rgba(232,122,159,0.12);
      --amber: #e8a87a;
      --amber-dim: rgba(232,168,122,0.12);
      --red: #c0394f;
      --red-dim: rgba(192,57,79,0.15);
      --teal: #d94f7a;
      --teal-dim: rgba(217,79,122,0.12);
      --purple: #f2a0b8;
      --purple-dim: rgba(242,160,184,0.12);
      --cream: #2a0f18;
      --burgundy: #7a1530;
      --radius: 8px; --radius-lg: 12px;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.6; }
    header { border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #ffffff; z-index: 10; }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; color: var(--cream); }
    .logo img { height: 84px; width: auto; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
    .logo-title { font-size: 14px; font-weight: 600; color: var(--cream); }
    .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; letter-spacing: .04em; }
    .header-right { display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); }
    #lastUpdated { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); }
    .layout { display: flex; height: calc(100vh - 64px); }
    aside { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 1.25rem 1rem; display: flex; flex-direction: column; gap: 1.25rem; }
    aside::-webkit-scrollbar { width: 4px; }
    aside::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
    .sidebar-label { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
    .chk-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: color .15s; }
    .chk-row:hover { color: var(--text); }
    .chk-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .state-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; margin-bottom: 8px; font-family: inherit; }
    .state-search:focus { border-color: var(--accent); }
    .state-search::placeholder { color: var(--text-dim); }
    .state-scroll { max-height: 220px; overflow-y: auto; }
    .state-scroll::-webkit-scrollbar { width: 3px; }
    .state-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .sel-count { font-size: 11px; color: var(--text-dim); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }
    select.styled { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; font-size: 12px; color: var(--text); outline: none; font-family: inherit; cursor: pointer; }
    select.styled:focus { border-color: var(--accent); }
    .run-btn { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s; }
    .run-btn:hover { opacity: .9; }
    .run-btn:active { transform: scale(.98); }
    .run-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .predict-btn { width: 100%; padding: 10px; background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(242,160,184,0.3); border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .predict-btn:hover { opacity: .8; }
    .predict-btn:disabled { opacity: .4; cursor: not-allowed; }
    main { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .main-header { margin-bottom: 1rem; }
    .main-header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; color: var(--cream); }
    .main-header p { font-size: 13px; color: var(--text-muted); }
    .tab-row { display: flex; gap: 4px; margin-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
    .tab { padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; color: var(--text-muted); transition: color .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--cream); border-bottom-color: var(--accent); }
    .bookmark-count { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: #fff; font-size: 10px; font-weight: 600; width: 16px; height: 16px; border-radius: 50%; margin-left: 5px; }
    .error-banner { background: var(--red-dim); border: 1px solid rgba(192,57,79,0.3); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; color: #f4a0aa; margin-bottom: 1rem; display: none; word-break: break-all; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; text-align: center; color: var(--text-muted); }
    .empty-icon { font-size: 40px; margin-bottom: 1rem; opacity: .3; }
    .empty-state h2 { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 13px; max-width: 320px; }
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem; gap: 12px; color: var(--text-muted); font-size: 13px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 12px; color: var(--text-muted); }
    .legend { display: flex; gap: 12px; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 2px; }
    .articles-grid { display: flex; flex-direction: column; gap: 10px; }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-left-width: 3px; border-radius: var(--radius-lg); padding: 1rem 1.25rem; transition: border-color .15s; position: relative; }
    .article-card:hover { border-color: var(--border-hover); }
    .article-card.high { border-left-color: var(--red); }
    .article-card.medium { border-left-color: var(--amber); }
    .article-card.low { border-left-color: var(--accent); }
    .card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 8px; padding-right: 32px; }
    .badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
    .badge-blue   { background: var(--accent-dim); color: #f2a0b8; }
    .badge-teal   { background: var(--teal-dim);   color: #f2a0b8; }
    .badge-green  { background: var(--green-dim);  color: #f2c0c8; }
    .badge-amber  { background: var(--amber-dim);  color: #e8c87a; }
    .badge-red    { background: var(--red-dim);    color: #f4a0aa; }
    .badge-purple { background: var(--purple-dim); color: var(--purple); }
    .badge-gray   { background: rgba(255,255,255,0.06); color: var(--text-muted); }
    .card-source { margin-left: auto; font-size: 11px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }
    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; color: var(--cream); }
    .card-summary { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 10px; opacity: .8; transition: opacity .15s; }
    .card-link:hover { opacity: 1; }
    .bookmark-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 18px; opacity: .35; transition: opacity .2s, transform .15s; padding: 2px; line-height: 1; }
    .bookmark-btn:hover { opacity: 1; transform: scale(1.15); }
    .bookmark-btn.saved { opacity: 1; }
    .prediction-box { background: var(--surface); border: 1px solid rgba(242,160,184,0.2); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; }
    .prediction-box h3 { font-size: 14px; font-weight: 600; color: var(--purple); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .prediction-box .pred-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; font-family: 'IBM Plex Mono', monospace; }
    .prediction-box p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 10px; }
    .prediction-box p:last-child { margin-bottom: 0; }
    .prediction-box strong { color: var(--cream); font-weight: 600; }
    @media (max-width: 768px) {
      .layout { flex-direction: column; height: auto; }
      aside { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
      main { padding: 1rem; }
    }
  
  #splash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  #splash-logo {
    height: 160px;
    width: auto;
    animation: bounce 0.6s infinite alternate cubic-bezier(.4,0,.2,1);
  }
  #splash-text {
    margin-top: 24px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    color: #b8788a;
    letter-spacing: .06em;
    text-transform: uppercase;
    font-weight: 500;
    opacity: 0;
    animation: fadein 0.5s 0.4s forwards;
  }
  @keyframes bounce {
    from { transform: translateY(0px); }
    to   { transform: translateY(-22px); }
  }
  @keyframes fadein { to { opacity: 1; } }

  </style>
</head>
<body>
<div id="splash"><img id="splash-logo" src="/logo.png" alt="PI"><p id="splash-text">Loading Policy Intelligence&hellip;</p></div>
<header>
  <div class="logo">
    <img src="/logo.png" alt="PI Logo">
    <div class="logo-text">
      <span class="logo-title">Policy Intelligence</span>
      <span class="logo-sub">Medicaid &amp; Home Care Monitor</span>
    </div>
  </div>
  <div class="header-right">
    <span id="lastUpdated"></span>
  </div>
</header>
<div class="layout">
  <aside>
    <div class="sidebar-section">
      <div class="sidebar-label">Topics</div>
      <div id="topicFilters"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Date Range</div>
      <select class="styled" id="dateRange">
        <option value="1">Last 30 days</option>
        <option value="3" selected>Last 3 months</option>
        <option value="6">Last 6 months</option>
        <option value="12">Last 12 months</option>
      </select>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Scope</div>
      <input class="state-search" type="text" id="stateSearch" placeholder="Search states…" oninput="filterStates(this.value)">
      <div class="state-scroll" id="stateList"></div>
      <p class="sel-count" id="selCount">0 selected</p>
    </div>
    <button class="run-btn" id="runBtn" onclick="runBriefing()">Run briefing</button>
    <button class="predict-btn" id="predictBtn" onclick="runPrediction()">✦ AI Prediction</button>
  </aside>
  <main>
    <div class="main-header">
      <h1>Policy Intelligence Briefing</h1>
      <p>Medicaid · Home care · Community-based services — federal &amp; state monitoring</p>
    </div>
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('briefing')">Briefing</button>
      <button class="tab" onclick="switchTab('bookmarks')" id="bookmarkTab">Bookmarks <span class="bookmark-count" id="bookmarkCount" style="display:none"></span></button>
      <button class="tab" onclick="switchTab('prediction')" id="predictionTab" style="display:none">✦ AI Prediction</button>
    </div>
    <div class="error-banner" id="errorBanner"></div>
    <div id="mainContent"></div>
  </main>
</div>
<script>
const STATES = ["Federal/National","Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming","District of Columbia"];
const TOPICS = [
  {id:"medicaid",label:"Medicaid Policy"},
  {id:"homecare",label:"Home Care"},
  {id:"hcbs",label:"HCBS / Waivers"},
  {id:"evv",label:"EVV / Compliance"},
  {id:"workforce",label:"Workforce"},
  {id:"budget",label:"Budget / Funding"},
  {id:"legislation",label:"Legislation"},
];
const TOPIC_BADGE = {
  "Medicaid Policy":"badge-blue","Home Care":"badge-teal",
  "HCBS / Waivers":"badge-green","HCBS/Waivers":"badge-green",
  "EVV / Compliance":"badge-amber","EVV/Compliance":"badge-amber",
  "Workforce":"badge-purple","Budget / Funding":"badge-red",
  "Budget/Funding":"badge-red","Legislation":"badge-blue",
};
let selStates = new Set();
let selTopics = new Set(TOPICS.map(t=>t.id));
let articles = [];
let predictionText = "";
let currentTab = "briefing";
let bookmarks = JSON.parse(localStorage.getItem("pi_bookmarks") || "[]");

function saveBookmarks(){ localStorage.setItem("pi_bookmarks", JSON.stringify(bookmarks)); updateBookmarkCount(); }
function updateBookmarkCount(){
  const c = document.getElementById("bookmarkCount");
  if(bookmarks.length > 0){ c.textContent = bookmarks.length; c.style.display = "inline-flex"; }
  else { c.style.display = "none"; }
}
function isBookmarked(title){ return bookmarks.some(b=>b.title===title); }
function toggleBookmark(article){
  if(isBookmarked(article.title)){ bookmarks = bookmarks.filter(b=>b.title!==article.title); }
  else { bookmarks.push({...article, savedAt: new Date().toISOString()}); }
  saveBookmarks();
  if(currentTab==="briefing") renderArticles(articles);
  if(currentTab==="bookmarks") renderBookmarks();
}
function buildTopicFilters(){
  document.getElementById("topicFilters").innerHTML = TOPICS.map(t=>
    '<label class="chk-row"><input type="checkbox" '+(selTopics.has(t.id)?"checked":"")+' onchange="toggleTopic(\''+t.id+'\',this.checked)"> '+t.label+'</label>'
  ).join("");
}
function toggleTopic(id,checked){ if(checked) selTopics.add(id); else selTopics.delete(id); }
function buildStateList(filter=""){
  const filtered = STATES.filter(s=>s.toLowerCase().includes(filter.toLowerCase()));
  document.getElementById("stateList").innerHTML = filtered.map(s=>
    '<label class="chk-row"><input type="checkbox" '+(selStates.has(s)?"checked":"")+' onchange="toggleState(\''+s.replace(/'/g,"\'")+'\',this.checked)"> '+s+'</label>'
  ).join("");
  updateCount();
}
function filterStates(v){ buildStateList(v); }
function toggleState(s,checked){ if(checked) selStates.add(s); else selStates.delete(s); updateCount(); }
function updateCount(){ document.getElementById("selCount").textContent = selStates.size+" selected"; }
function showError(msg){ const b=document.getElementById("errorBanner"); b.textContent=typeof msg==="object"?JSON.stringify(msg):msg; b.style.display="block"; }
function hideError(){ document.getElementById("errorBanner").style.display="none"; }
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelector('[onclick="switchTab(\''+tab+'\')"]').classList.add("active");
  hideError();
  if(tab==="briefing") renderArticles(articles);
  if(tab==="bookmarks") renderBookmarks();
  if(tab==="prediction") renderPrediction();
}
function cardHTML(a){
  const urg=(a.urgency||"low").toLowerCase();
  const tb=TOPIC_BADGE[a.topic]||"badge-gray";
  const src=[a.source,a.date].filter(Boolean).join(" · ");
  const bm=isBookmarked(a.title);
  const aj=JSON.stringify(a).replace(/\/g,"\\").replace(/'/g,"\'");
  return '<div class="article-card '+urg+'">'+
    '<button class="bookmark-btn '+(bm?"saved":"")+'" onclick=\'toggleBookmark('+JSON.stringify(a)+')\' title="'+(bm?"Remove bookmark":"Save bookmark")+'">'+(bm?"🔖":"🏷️")+'</button>'+
    '<div class="card-meta">'+
    '<span class="badge badge-blue">'+(a.state||"Unknown")+'</span>'+
    '<span class="badge '+tb+'">'+(a.topic||"General")+'</span>'+
    (urg==="high"?'<span class="badge badge-red">High priority</span>':'')+
    '<span class="card-source">'+src+'</span>'+
    '</div>'+
    '<p class="card-title">'+a.title+'</p>'+
    '<p class="card-summary">'+a.summary+'</p>'+
    (a.url&&a.url.startsWith("http")?'<a class="card-link" href="'+a.url+'" target="_blank">↗ Read source</a>':'')+
    '</div>';
}
function renderArticles(data){
  if(!data.length){ document.getElementById("mainContent").innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><h2>No briefing loaded yet</h2><p>Select your states and topics on the left, then click Run Briefing to pull the latest policy updates.</p></div>'; return; }
  document.getElementById("mainContent").innerHTML=
    '<div class="results-meta"><span>'+data.length+' update'+(data.length!==1?"s":"")+" found</span>"+
    '<div class="legend"><span class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>High</span><span class="legend-item"><span class="legend-dot" style="background:var(--amber)"></span>Medium</span><span class="legend-item"><span class="legend-dot" style="background:var(--accent)"></span>Low</span></div></div>'+
    '<div class="articles-grid">'+data.map(a=>cardHTML(a)).join("")+'</div>';
}
function renderBookmarks(){
  if(!bookmarks.length){ document.getElementById("mainContent").innerHTML='<div class="empty-state"><div class="empty-icon">🔖</div><h2>No bookmarks yet</h2><p>Hit the bookmark icon on any briefing card to save it here.</p></div>'; return; }
  document.getElementById("mainContent").innerHTML=
    '<div class="results-meta"><span>'+bookmarks.length+' saved item'+(bookmarks.length!==1?"s":"")+'</span><button onclick="clearBookmarks()" style="background:none;border:none;color:var(--red);font-size:12px;cursor:pointer;font-family:inherit;">Clear all</button></div>'+
    '<div class="articles-grid">'+bookmarks.map(a=>cardHTML(a)).join("")+'</div>';
}
function clearBookmarks(){ if(confirm("Clear all bookmarks?")){ bookmarks=[]; saveBookmarks(); renderBookmarks(); } }
function renderPrediction(){
  if(!predictionText){ document.getElementById("mainContent").innerHTML='<div class="empty-state"><div class="empty-icon">✦</div><h2>No prediction generated yet</h2><p>Select your states and click AI Prediction to generate a forward-looking analysis based on the last 12 months of policy trends.</p></div>'; return; }
  document.getElementById("mainContent").innerHTML='<div class="prediction-box"><h3>✦ AI Policy Prediction</h3><p class="pred-meta">Generated '+new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})+' · Based on 12-month trend analysis</p>'+predictionText+'</div>';
}
async function callAPI(prompt){
  const res=await fetch("/api/briefing",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:8000,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:prompt}]})});
  const rawText=await res.text();
  let parsed_res;
  try { parsed_res=JSON.parse(rawText); } catch(e){ throw new Error("Server error: "+rawText.slice(0,200)); }
  if(!res.ok){ throw new Error("API error "+res.status+": "+(parsed_res.error?.message||JSON.stringify(parsed_res))); }
  return (parsed_res.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
}
async function runBriefing(){
  if(selStates.size===0){ showError("Select at least one state or scope."); return; }
  hideError();
  const btn=document.getElementById("runBtn");
  btn.disabled=true; btn.textContent="Fetching…";
  switchTab("briefing");
  document.getElementById("mainContent").innerHTML='<div class="loading-state"><div class="spinner"></div><span>Searching across '+selStates.size+' scope'+(selStates.size!==1?"s":"")+'...</span></div>';
  const months=document.getElementById("dateRange").value;
  const dateLabel=months==="1"?"last 30 days":months==="3"?"last 3 months":months==="6"?"last 6 months":"last 12 months";
  const statesStr=Array.from(selStates).join(", ");
  const topicsStr=TOPICS.filter(t=>selTopics.has(t.id)).map(t=>t.label).join(", ");
  const prompt="Search the web for news and policy changes from the "+dateLabel+" related to home care, Medicaid, and community-based programs in: "+statesStr+".\nTopics: "+topicsStr+".\nOnly include items from the "+dateLabel+". Return ONLY a raw JSON array, no markdown, no fences. Up to 12 items:\n{\"title\":\"headline\",\"summary\":\"2-3 sentences\",\"state\":\"state or Federal/National\",\"topic\":\"Medicaid Policy|Home Care|HCBS/Waivers|EVV/Compliance|Workforce|Budget/Funding|Legislation\",\"date\":\"month year\",\"source\":\"name\",\"url\":\"url or empty\",\"urgency\":\"high|medium|low\"}";
  try {
    const text=await callAPI(prompt);
    const clean=text.replace(/```json|```/g,"").trim();
    const match=clean.match(/\[[\s\S]*\]/);
    const parsed=JSON.parse(match?match[0]:clean);
    if(Array.isArray(parsed)){ articles=parsed; renderArticles(articles); document.getElementById("lastUpdated").textContent="Last run: "+new Date().toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}); }
    else { showError("Unexpected format"); renderArticles([]); }
  } catch(err){ showError(err.message); renderArticles([]); }
  finally { btn.disabled=false; btn.textContent="Run briefing"; }
}
async function runPrediction(){
  if(selStates.size===0){ showError("Select at least one state for the prediction."); return; }
  hideError();
  const btn=document.getElementById("predictBtn");
  btn.disabled=true; btn.textContent="Analyzing…";
  document.getElementById("predictionTab").style.display="";
  switchTab("prediction");
  document.getElementById("mainContent").innerHTML='<div class="loading-state"><div class="spinner"></div><span>Analyzing 12 months of policy trends...</span></div>';
  const statesStr=Array.from(selStates).join(", ");
  const prompt="You are a senior health policy analyst specializing in Medicaid and home care.\n\nSearch the web for policy trends, legislative activity, budget decisions, and regulatory changes over the last 12 months related to Medicaid, home care, HCBS, and community-based services in: "+statesStr+".\n\nBased on what you find, write a forward-looking predictive analysis covering:\n1. The most significant trends and their direction\n2. Specific predictions for the next 6-12 months in these states\n3. How these changes could directly impact home care providers and recipients\n4. Warning signs or opportunities home care operators should watch now\n\nFormat as clear paragraphs with bold section headers. Be specific with bill names, programs, dollar amounts. Write for a senior policy professional.";
  try {
    const text=await callAPI(prompt);
    predictionText=text.replace(/\*\*(.*?)\*\*/g,"<strong></strong>").split("\n\n").map(p=>"<p>"+p.replace(/\n/g,"<br>")+"</p>").join("");
    renderPrediction();
  } catch(err){ showError(err.message); }
  finally { btn.disabled=false; btn.textContent="✦ AI Prediction"; }
}
buildTopicFilters();
buildStateList();
updateBookmarkCount();
renderArticles([]);
